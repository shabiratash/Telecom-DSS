<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · {{ app_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-orb orb1"></div>
    <div class="login-orb orb2"></div>
    <div class="login-card glass">
        <div class="login-logo"><i class="bi bi-broadcast"></i></div>
        <h2>Afghanistan Telecom</h2>
        <p class="muted">Churn Decision Support System</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
          {% endfor %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="input-icon">
                <i class="bi bi-person"></i>
                <input type="text" name="username" class="form-control" placeholder="Username" required autofocus>
            </div>
            <div class="input-icon">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-gradient w-100 mt-2">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>
        <p class="login-hint muted">Default: <code>admin</code> / <code>admin123</code></p>
    </div>
</body>
</html>
