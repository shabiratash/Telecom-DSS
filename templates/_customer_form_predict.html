{# Prediction input form. Mirrors the 15 churn-driver features. #}
<div class="row g-3">
    <div class="col-md-4">
        <label class="form-label">Age</label>
        <input type="number" name="age" min="10" max="100" class="form-control" value="{{ c.get('age','30') if c else '30' }}" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-select">
            {% for g in options.genders %}<option {% if c and c.get('gender')==g %}selected{% endif %}>{{ g }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Province</label>
        <select name="province_name" class="form-select">
            {% for p in options.provinces %}<option value="{{ p.province_name }}" {% if c and c.get('province_name')==p.province_name %}selected{% endif %}>{{ p.province_name }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Area Type</label>
        <select name="area_type" class="form-select">
            {% for a in options.area_types %}<option {% if c and c.get('area_type')==a %}selected{% endif %}>{{ a }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Network Quality</label>
        <select name="network_quality" class="form-select">
            {% for n in options.network_quality %}<option {% if c and c.get('network_quality')==n %}selected{% endif %}>{{ n }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Internet Type</label>
        <select name="internet_type" class="form-select">
            {% for i in options.internet_types %}<option {% if c and c.get('internet_type')==i %}selected{% endif %}>{{ i }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Call Drop Rate (%)</label>
        <input type="number" step="0.01" name="call_drop_rate" class="form-control" value="{{ c.get('call_drop_rate','5') if c else '5' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Recharge Amount (AFN)</label>
        <input type="number" step="0.01" name="recharge_amount" class="form-control" value="{{ c.get('recharge_amount','200') if c else '200' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Recharge Frequency</label>
        <input type="number" name="recharge_frequency" class="form-control" value="{{ c.get('recharge_frequency','8') if c else '8' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Payment Method</label>
        <select name="payment_method" class="form-select">
            {% for p in options.payment_methods %}<option {% if c and c.get('payment_method')==p %}selected{% endif %}>{{ p }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Tenure (months)</label>
        <input type="number" name="tenure_months" class="form-control" value="{{ c.get('tenure_months','12') if c else '12' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Inactive Days</label>
        <input type="number" name="inactive_days" class="form-control" value="{{ c.get('inactive_days','10') if c else '10' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Complaint Count</label>
        <input type="number" name="complaint_count" class="form-control" value="{{ c.get('complaint_count','1') if c else '1' }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Tower Availability</label>
        <select name="tower_availability" class="form-select">
            {% for t in options.tower_availability %}<option {% if c and c.get('tower_availability')==t %}selected{% endif %}>{{ t }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Competitor Offer Exposure</label>
        <select name="competitor_offer_exposure" class="form-select">
            {% for y in options.yes_no %}<option {% if c and c.get('competitor_offer_exposure')==y %}selected{% endif %}>{{ y }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Discount Usage</label>
        <select name="discount_usage" class="form-select">
            {% for y in options.yes_no %}<option {% if c and c.get('discount_usage')==y %}selected{% endif %}>{{ y }}</option>{% endfor %}
        </select>
    </div>
</div>
