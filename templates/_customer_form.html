{# Reusable customer form fields. Expects `c` dict-like (attr or key access) and `options`. #}
{% macro val(c, key, default='') %}{% if c %}{{ c[key] if c is mapping else c|attr(key) }}{% else %}{{ default }}{% endif %}{% endmacro %}

<div class="row g-3">
    <div class="col-md-4">
        <label class="form-label">Age</label>
        <input type="number" name="age" min="10" max="100" class="form-control" value="{{ val(c,'age') }}" required>
    </div>
    <div class="col-md-4">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-select" required>
            {% for g in options.genders %}<option {% if val(c,'gender')==g %}selected{% endif %}>{{ g }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Province</label>
        <select name="province_id" class="form-select" required>
            {% for p in options.provinces %}
            <option value="{{ p.province_id }}" {% if val(c,'province_id')|string==p.province_id|string %}selected{% endif %}>{{ p.province_name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Area Type</label>
        <select name="area_type" class="form-select">
            {% for a in options.area_types %}<option {% if val(c,'area_type')==a %}selected{% endif %}>{{ a }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Network Quality</label>
        <select name="network_quality" class="form-select">
            {% for n in options.network_quality %}<option {% if val(c,'network_quality')==n %}selected{% endif %}>{{ n }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Internet Type</label>
        <select name="internet_type" class="form-select">
            {% for i in options.internet_types %}<option {% if val(c,'internet_type')==i %}selected{% endif %}>{{ i }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Call Drop Rate (%)</label>
        <input type="number" step="0.01" name="call_drop_rate" class="form-control" value="{{ val(c,'call_drop_rate',0) }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Recharge Amount (AFN)</label>
        <input type="number" step="0.01" name="recharge_amount" class="form-control" value="{{ val(c,'recharge_amount',0) }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Recharge Frequency</label>
        <input type="number" name="recharge_frequency" class="form-control" value="{{ val(c,'recharge_frequency',0) }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Payment Method</label>
        <select name="payment_method" class="form-select">
            {% for p in options.payment_methods %}<option {% if val(c,'payment_method')==p %}selected{% endif %}>{{ p }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Tenure (months)</label>
        <input type="number" name="tenure_months" class="form-control" value="{{ val(c,'tenure_months',0) }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Inactive Days</label>
        <input type="number" name="inactive_days" class="form-control" value="{{ val(c,'inactive_days',0) }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Complaint Count</label>
        <input type="number" name="complaint_count" class="form-control" value="{{ val(c,'complaint_count',0) }}">
    </div>
    <div class="col-md-4">
        <label class="form-label">Tower Availability</label>
        <select name="tower_availability" class="form-select">
            {% for t in options.tower_availability %}<option {% if val(c,'tower_availability')==t %}selected{% endif %}>{{ t }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Competitor Offer Exposure</label>
        <select name="competitor_offer_exposure" class="form-select">
            {% for y in options.yes_no %}<option {% if val(c,'competitor_offer_exposure')==y %}selected{% endif %}>{{ y }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Discount Usage</label>
        <select name="discount_usage" class="form-select">
            {% for y in options.yes_no %}<option {% if val(c,'discount_usage')==y %}selected{% endif %}>{{ y }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-4">
        <label class="form-label">Churn Status</label>
        <select name="churn" class="form-select">
            <option value="0" {% if val(c,'churn')|string=='0' %}selected{% endif %}>Active</option>
            <option value="1" {% if val(c,'churn')|string=='1' %}selected{% endif %}>Churned</option>
        </select>
    </div>
</div>
